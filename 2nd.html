<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Menu</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #222;
    }

    /* Header */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #eee;
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
        color: #1a73e8;
    }

    .logo small {
        display: block;
        font-size: 12px;
        color: #777;
        font-weight: normal;
    }

    .close {
        font-size: 28px;
        color: #1a73e8;
        cursor: pointer;
    }

    /* Menu */
    .menu {
        padding: 10px 20px 30px;
    }

    .section-title {
        font-size: 13px;
        letter-spacing: 2px;
        color: #999;
        margin: 25px 0 10px;
    }

    .menu-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        font-size: 20px;
        border-bottom: 1px solid #f1f1f1;
        cursor: pointer;
    }

    .menu-item span {
        color: #666;
        font-size: 22px;
    }

    .simple-link {
        font-size: 20px;
        padding: 14px 0;
        border-bottom: 1px solid #f1f1f1;
    }

    .account {
        margin-top: 20px;
        font-size: 20px;
        color: #1a73e8;
        font-weight: bold;
    }
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        resume.io
        <small>by career.io</small>
    </div>
    <div class="close">✕</div>
</div>

<!-- Menu -->
<div class="menu">

    <div class="section-title">RESUME</div>

    <div class="menu-item">Resume Templates <span>⌄</span></div>
    <div class="menu-item">Resume Examples <span>⌄</span></div>
    <div class="menu-item">Most Popular <span>⌄</span></div>

    <div class="section-title">COVER LETTER</div>

    <div class="menu-item">Cover Letter Templates <span>⌄</span></div>
    <div class="menu-item">Cover Letter Examples <span>⌄</span></div>
    <div class="menu-item">Cover Letter Builder <span>⌄</span></div>

    <div class="section-title">RESOURCES</div>

    <div class="menu-item">Resources <span>⌄</span></div>
    <div class="menu-item">Blog Categories <span>⌄</span></div>

    <div class="simple-link">About Us</div>
    <div class="simple-link">FAQ</div>

    <div class="account">My Account →</div>

</div>

</body>
</html>
