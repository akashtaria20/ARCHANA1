<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sister's Digital Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Our Best Memories</h1>
            <p>A special collection for my sister</p>
        </div>
    </header>

    <main class="timeline">
        <div class="container left">
            <div class="content">
                <img src="photo1.jpg" alt="Memory 1">
                <div class="text-box">
                    <span>2024</span>
                    <p>The day we explored the city together.</p>
                </div>
            </div>
        </div>

        <div class="container right">
            <div class="content">
                <img src="photo2.jpg" alt="Memory 2">
                <div class="text-box">
                    <span>2025</span>
                    <p>Celebrations and beautiful smiles!</p>
                </div>
            </div>
        </div>

        <div class="container left">
            <div class="content">
                <img src="photo3.jpg" alt="Memory 3">
                <div class="text-box">
                    <span>Special Moment</span>
                    <p>Always my best friend.</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Created with ❤️ by her brother</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
